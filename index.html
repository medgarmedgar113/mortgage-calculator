<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      color: #8899aa;
      font-size: 16px;
      min-height: 24px;
      word-break: break-all;
    }

    .display .result {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 600;
      margin-top: 6px;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 18px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      font-weight: 500;
    }

    button:active { transform: scale(0.95); }

    .btn-number {
      background: #1a1a40;
      color: #e2e8f0;
    }
    .btn-number:hover { background: #252550; }

    .btn-operator {
      background: #e94560;
      color: #fff;
    }
    .btn-operator:hover { background: #ff6b81; }

    .btn-function {
      background: #533483;
      color: #e2e8f0;
    }
    .btn-function:hover { background: #6a45a0; }

    .btn-equals {
      background: #0ea5e9;
      color: #fff;
      grid-column: span 2;
    }
    .btn-equals:hover { background: #38bdf8; }

    .btn-zero { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-function" onclick="clearAll()">AC</button>
      <button class="btn-function" onclick="toggleSign()">+/−</button>
      <button class="btn-function" onclick="addPercent()">%</button>
      <button class="btn-operator" onclick="addOperator('÷')">÷</button>

      <button class="btn-number" onclick="addDigit('7')">7</button>
      <button class="btn-number" onclick="addDigit('8')">8</button>
      <button class="btn-number" onclick="addDigit('9')">9</button>
      <button class="btn-operator" onclick="addOperator('×')">×</button>

      <button class="btn-number" onclick="addDigit('4')">4</button>
      <button class="btn-number" onclick="addDigit('5')">5</button>
      <button class="btn-number" onclick="addDigit('6')">6</button>
      <button class="btn-operator" onclick="addOperator('−')">−</button>

      <button class="btn-number" onclick="addDigit('1')">1</button>
      <button class="btn-number" onclick="addDigit('2')">2</button>
      <button class="btn-number" onclick="addDigit('3')">3</button>
      <button class="btn-operator" onclick="addOperator('+')">+</button>

      <button class="btn-number btn-zero" onclick="addDigit('0')">0</button>
      <button class="btn-number" onclick="addDecimal()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = '';
    let operator = '';
    let resetNext = false;

    const expressionEl = document.getElementById('expression');
    const resultEl = document.getElementById('result');

    function updateDisplay() {
      resultEl.textContent = current;
      expressionEl.textContent = previous ? `${previous} ${operator}` : '';
    }

    function addDigit(d) {
      if (resetNext) { current = '0'; resetNext = false; }
      if (current === '0' && d !== '0') {
        current = d;
      } else if (current !== '0') {
        current += d;
      }
      updateDisplay();
    }

    function addDecimal() {
      if (resetNext) { current = '0'; resetNext = false; }
      if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    function addOperator(op) {
      if (previous && !resetNext) calculate();
      previous = current;
      operator = op;
      resetNext = true;
      updateDisplay();
    }

    function calculate() {
      if (!previous) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      let result;

      switch (operator) {
        case '+': result = a + b; break;
        case '−': result = a - b; break;
        case '×': result = a * b; break;
        case '÷': result = b !== 0 ? a / b : 'Error'; break;
        default: return;
      }

      expressionEl.textContent = `${previous} ${operator} ${current} =`;
      current = result === 'Error' ? 'Error' : String(parseFloat(result.toFixed(10)));
      previous = '';
      operator = '';
      resetNext = true;
      resultEl.textContent = current;
    }

    function clearAll() {
      current = '0';
      previous = '';
      operator = '';
      resetNext = false;
      updateDisplay();
    }

    function toggleSign() {
      if (current !== '0' && current !== 'Error') {
        current = String(-parseFloat(current));
        updateDisplay();
      }
    }

    function addPercent() {
      if (current !== 'Error') {
        current = String(parseFloat(current) / 100);
        updateDisplay();
      }
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') addDigit(e.key);
      else if (e.key === '.') addDecimal();
      else if (e.key === '+') addOperator('+');
      else if (e.key === '-') addOperator('−');
      else if (e.key === '*') addOperator('×');
      else if (e.key === '/') { e.preventDefault(); addOperator('÷'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        updateDisplay();
      }
    });
  </script>
</body>
</html>
